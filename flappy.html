<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird | Game Hub</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .flappy-canvas-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    #flappyCanvas {
      width: 760px;
      max-width: 100%;
      height: 260px;
      display: block;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, #76d8ff, #dff7ff 70%, #d8f1cb);
    }

    @media (max-width: 900px) {
      #flappyCanvas {
        height: 220px;
      }
    }

    @media (max-width: 640px) {
      #flappyCanvas {
        height: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <main class="game-page-wrap">
      <section class="game-panel">
        <div class="game-topbar">
          <div class="game-header-left">
            <p class="eyebrow">ARCADE</p>
            <h1>Flappy Bird</h1>
            <p class="game-subtext">
              Press Space or click to flap. Fly through the pipes and beat your best score.
            </p>
          </div>
          <a href="index.html" class="back-link">← Home</a>
        </div>

        <div class="info-row">
          <div class="status-box">Controls: Space / Click</div>
          <div class="status-box" id="flappyScoreBox">Score: 0</div>
          <div class="status-box" id="flappyBestBox">Best: 0</div>
        </div>

        <div class="flappy-canvas-wrap">
          <canvas id="flappyCanvas" width="760" height="260"></canvas>
        </div>

        <div class="bottom-actions">
          <button class="secondary-button" id="flappyRestart">Restart</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const flappyCanvas = document.getElementById("flappyCanvas");
    const flappyCtx = flappyCanvas.getContext("2d");
    const flappyScoreBox = document.getElementById("flappyScoreBox");
    const flappyBestBox = document.getElementById("flappyBestBox");
    const flappyRestart = document.getElementById("flappyRestart");

    const bird = {
      x: 120,
      y: 120,
      width: 30,
      height: 22,
      velocity: 0,
      gravity: 0.38,
      flap: -5.8
    };

    let pipes = [];
    let flappyScore = 0;
    let flappyBest = Number(localStorage.getItem("flappyBest") || 0);
    let flappyFrame = 0;
    let flappyStarted = false;
    let flappyGameOver = false;

    flappyBestBox.textContent = "Best: " + flappyBest;

    function resetFlappyGame() {
      bird.y = 120;
      bird.velocity = 0;
      pipes = [];
      flappyScore = 0;
      flappyFrame = 0;
      flappyStarted = false;
      flappyGameOver = false;
      flappyScoreBox.textContent = "Score: 0";
    }

    function doFlap() {
      if (flappyGameOver) return;
      flappyStarted = true;
      bird.velocity = bird.flap;
    }

    function makePipe() {
      const topHeight = Math.floor(Math.random() * 90) + 30;
      const gap = 85;

      pipes.push({
        x: flappyCanvas.width,
        width: 58,
        top: topHeight,
        gap,
        passed: false
      });
    }

    function drawFlappyBackground() {
      const sky = flappyCtx.createLinearGradient(0, 0, 0, flappyCanvas.height);
      sky.addColorStop(0, "#76d8ff");
      sky.addColorStop(0.7, "#e4f8ff");
      sky.addColorStop(1, "#d5f1ca");
      flappyCtx.fillStyle = sky;
      flappyCtx.fillRect(0, 0, flappyCanvas.width, flappyCanvas.height);

      flappyCtx.fillStyle = "rgba(255,255,255,0.55)";
      flappyCtx.beginPath();
      flappyCtx.arc(70, 55, 24, 0, Math.PI * 2);
      flappyCtx.fill();

      flappyCtx.fillStyle = "#d2efb4";
      flappyCtx.fillRect(0, flappyCanvas.height - 26, flappyCanvas.width, 26);
    }

    function drawBird() {
      flappyCtx.fillStyle = "#ffd34d";
      flappyCtx.fillRect(bird.x, bird.y, bird.width, bird.height);

      flappyCtx.fillStyle = "#ff9238";
      flappyCtx.fillRect(bird.x + 25, bird.y + 8, 11, 6);

      flappyCtx.fillStyle = "#ffffff";
      flappyCtx.fillRect(bird.x + 16, bird.y + 4, 8, 8);

      flappyCtx.fillStyle = "#111111";
      flappyCtx.fillRect(bird.x + 19, bird.y + 7, 3, 3);
    }

    function drawPipes() {
      pipes.forEach((pipe) => {
        const bottomY = pipe.top + pipe.gap;
        const bottomHeight = flappyCanvas.height - bottomY;

        flappyCtx.fillStyle = "#25b85d";
        flappyCtx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        flappyCtx.fillRect(pipe.x, bottomY, pipe.width, bottomHeight);

        flappyCtx.fillStyle = "#1f954c";
        flappyCtx.fillRect(pipe.x - 4, pipe.top - 12, pipe.width + 8, 12);
        flappyCtx.fillRect(pipe.x - 4, bottomY, pipe.width + 8, 12);
      });
    }

    function updateBird() {
      if (!flappyStarted || flappyGameOver) return;
      bird.velocity += bird.gravity;
      bird.y += bird.velocity;
    }

    function updatePipes() {
      if (!flappyStarted || flappyGameOver) return;

      if (flappyFrame % 90 === 0) {
        makePipe();
      }

      pipes.forEach((pipe) => {
        pipe.x -= 3.2;

        if (!pipe.passed && pipe.x + pipe.width < bird.x) {
          pipe.passed = true;
          flappyScore++;
          flappyScoreBox.textContent = "Score: " + flappyScore;

          if (flappyScore > flappyBest) {
            flappyBest = flappyScore;
            localStorage.setItem("flappyBest", flappyBest);
            flappyBestBox.textContent = "Best: " + flappyBest;
          }
        }
      });

      pipes = pipes.filter((pipe) => pipe.x + pipe.width > -20);
    }

    function checkFlappyCollision() {
      if (bird.y <= 0 || bird.y + bird.height >= flappyCanvas.height - 26) {
        flappyGameOver = true;
      }

      for (const pipe of pipes) {
        const bottomY = pipe.top + pipe.gap;
        const hitX = bird.x + bird.width > pipe.x && bird.x < pipe.x + pipe.width;
        const hitTop = bird.y < pipe.top;
        const hitBottom = bird.y + bird.height > bottomY;

        if (hitX && (hitTop || hitBottom)) {
          flappyGameOver = true;
        }
      }
    }

    function drawScore() {
      flappyCtx.fillStyle = "#14314f";
      flappyCtx.font = "bold 20px Arial";
      flappyCtx.fillText("Score: " + flappyScore, 16, 28);
    }

    function drawFlappyOverlay() {
      if (!flappyStarted && !flappyGameOver) {
        flappyCtx.fillStyle = "rgba(0,0,0,0.20)";
        flappyCtx.fillRect(265, 85, 230, 72);

        flappyCtx.fillStyle = "#ffffff";
        flappyCtx.font = "bold 24px Arial";
        flappyCtx.fillText("Ready?", 338, 113);

        flappyCtx.font = "15px Arial";
        flappyCtx.fillText("Click or press Space", 315, 136);
      }

      if (flappyGameOver) {
        flappyCtx.fillStyle = "rgba(0,0,0,0.24)";
        flappyCtx.fillRect(250, 82, 255, 78);

        flappyCtx.fillStyle = "#ffffff";
        flappyCtx.font = "bold 24px Arial";
        flappyCtx.fillText("Game Over", 323, 110);

        flappyCtx.font = "15px Arial";
        flappyCtx.fillText("Press Restart to play again", 292, 136);
      }
    }

    function flappyLoop() {
      drawFlappyBackground();

      if (!flappyGameOver) {
        updateBird();
        updatePipes();
        checkFlappyCollision();
        if (flappyStarted) flappyFrame++;
      }

      drawPipes();
      drawBird();
      drawScore();
      drawFlappyOverlay();

      requestAnimationFrame(flappyLoop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        doFlap();
      }
    });

    flappyCanvas.addEventListener("click", doFlap);
    flappyRestart.addEventListener("click", resetFlappyGame);

    resetFlappyGame();
    flappyLoop();
  </script>
</body>
</html>

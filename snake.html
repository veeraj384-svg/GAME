<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake | Game Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <main class="game-page-wrap">
      <section class="game-panel">
        <div class="game-topbar">
          <div class="game-header-left">
            <p class="eyebrow">CLASSIC</p>
            <h1>Snake</h1>
            <p class="game-subtext">
              Use the arrow keys to collect food, grow your snake, and avoid crashing.
            </p>
          </div>
          <a href="index.html" class="back-link">← Home</a>
        </div>

        <div class="info-row">
          <div class="status-box">Move: Arrow Keys</div>
          <div class="status-box" id="snakeScoreBox">Score: 0</div>
          <div class="status-box" id="snakeBestBox">Best: 0</div>
        </div>

        <div class="canvas-wrap">
          <canvas id="snakeCanvas" class="game-canvas" width="420" height="420"></canvas>
        </div>

        <div class="bottom-actions">
          <button class="secondary-button" id="snakeRestart">Restart</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const snakeCanvas = document.getElementById("snakeCanvas");
    const snakeCtx = snakeCanvas.getContext("2d");
    const snakeScoreBox = document.getElementById("snakeScoreBox");
    const snakeBestBox = document.getElementById("snakeBestBox");
    const snakeRestart = document.getElementById("snakeRestart");

    const gridSize = 20;
    const tileCount = snakeCanvas.width / gridSize;

    let snake = [{ x: 10, y: 10 }];
    let food = { x: 5, y: 5 };
    let dx = 1;
    let dy = 0;
    let snakeScore = 0;
    let snakeBest = Number(localStorage.getItem("snakeBestScore") || 0);
    let snakeGameOver = false;

    snakeBestBox.textContent = "Best: " + snakeBest;

    function placeFood() {
      food.x = Math.floor(Math.random() * tileCount);
      food.y = Math.floor(Math.random() * tileCount);
    }

    function resetSnakeGame() {
      snake = [{ x: 10, y: 10 }];
      dx = 1;
      dy = 0;
      snakeScore = 0;
      snakeGameOver = false;
      placeFood();
      snakeScoreBox.textContent = "Score: 0";
    }

    function drawSnakeBackground() {
      const bg = snakeCtx.createLinearGradient(0, 0, snakeCanvas.width, snakeCanvas.height);
      bg.addColorStop(0, "#0c1730");
      bg.addColorStop(1, "#07101f");
      snakeCtx.fillStyle = bg;
      snakeCtx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);
    }

    function drawFood() {
      snakeCtx.fillStyle = "#ff658d";
      snakeCtx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        snakeCtx.fillStyle = index === 0 ? "#9effbf" : "#52d68b";
        snakeCtx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
      });
    }

    function moveSnake() {
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        snakeScore++;
        snakeScoreBox.textContent = "Score: " + snakeScore;
        if (snakeScore > snakeBest) {
          snakeBest = snakeScore;
          localStorage.setItem("snakeBestScore", snakeBest);
          snakeBestBox.textContent = "Best: " + snakeBest;
        }
        placeFood();
      } else {
        snake.pop();
      }
    }

    function checkSnakeCollision() {
      const head = snake[0];

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
      ) {
        snakeGameOver = true;
      }

      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          snakeGameOver = true;
        }
      }
    }

    function drawSnakeOverlay() {
      if (!snakeGameOver) return;
      snakeCtx.fillStyle = "rgba(7, 12, 24, 0.6)";
      snakeCtx.fillRect(90, 160, 240, 95);
      snakeCtx.fillStyle = "#ffffff";
      snakeCtx.font = "bold 28px Arial";
      snakeCtx.fillText("Game Over", 136, 200);
      snakeCtx.font = "17px Arial";
      snakeCtx.fillText("Press Restart to play again", 109, 230);
    }

    function snakeLoop() {
      if (!snakeGameOver) {
        moveSnake();
        checkSnakeCollision();
      }

      drawSnakeBackground();
      drawFood();
      drawSnake();
      drawSnakeOverlay();

      setTimeout(snakeLoop, 110);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp" && dy !== 1) {
        dx = 0; dy = -1;
      } else if (e.key === "ArrowDown" && dy !== -1) {
        dx = 0; dy = 1;
      } else if (e.key === "ArrowLeft" && dx !== 1) {
        dx = -1; dy = 0;
      } else if (e.key === "ArrowRight" && dx !== -1) {
        dx = 1; dy = 0;
      }
    });

    snakeRestart.addEventListener("click", resetSnakeGame);

    resetSnakeGame();
    snakeLoop();
  </script>
</body>
</html>

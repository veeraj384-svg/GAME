<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dash | Premium Arcade Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <main class="app-shell">
    <section class="hero-card glass">
      <div class="hero-text">
        <p class="eyebrow">ARCADE MODE</p>
        <h1>Neon Dash</h1>
        <p class="subtext">
          Dodge the red danger blocks, collect glowing coins, and survive as long as you can.
          Fast, fun, and premium.
        </p>
      </div>

      <div class="stats-panel">
        <div class="stat-box glass-inner">
          <span class="label">Score</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="stat-box glass-inner">
          <span class="label">Best</span>
          <span id="bestScore" class="value">0</span>
        </div>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platformer Quest | Game Hub</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .platformer-canvas-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    #platformerCanvas {
      width: 900px;
      max-width: 100%;
      height: 420px;
      display: block;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, #6fd7ff 0%, #dff7ff 70%, #dff0c6 100%);
    }

    @media (max-width: 900px) {
      #platformerCanvas {
        height: 340px;
      }
    }

    @media (max-width: 640px) {
      #platformerCanvas {
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <main class="game-page-wrap">
      <section class="game-panel">
        <div class="game-topbar">
          <div class="game-header-left">
            <p class="eyebrow">ADVENTURE</p>
            <h1>Platformer Quest</h1>
            <p class="game-subtext">
              Run, jump, collect coins, avoid spikes, and reach the flag to unlock the next level.
            </p>
          </div>
          <a href="index.html" class="back-link">← Home</a>
        </div>

        <div class="info-row">
          <div class="status-box">Move: Left / Right</div>
          <div class="status-box">Jump: Space / Up</div>
          <div class="status-box" id="levelBox">Level: 1</div>
          <div class="status-box" id="coinBox">Coins: 0</div>
          <div class="status-box" id="livesBox">Lives: 3</div>
        </div>

        <div class="platformer-canvas-wrap">
          <canvas id="platformerCanvas" width="900" height="420"></canvas>
        </div>

        <div class="bottom-actions">
          <button class="secondary-button" id="restartBtn">Restart Level</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("platformerCanvas");
    const ctx = canvas.getContext("2d");

    const levelBox = document.getElementById("levelBox");
    const coinBox = document.getElementById("coinBox");
    const livesBox = document.getElementById("livesBox");
    const restartBtn = document.getElementById("restartBtn");

    const gravity = 0.6;
    const friction = 0.8;
    const moveSpeed = 0.8;
    const maxSpeed = 6;
    const jumpPower = -12;

    let keys = {
      left: false,
      right: false
    };

    let totalCoins = 0;
    let lives = 3;
    let currentLevelIndex = 0;
    let levelCompleteTimer = 0;
    let gameWon = false;

    const levels = [
      {
        playerStart: { x: 40, y: 300 },
        platforms: [
          { x: 0, y: 380, w: 900, h: 40 },
          { x: 160, y: 320, w: 120, h: 16 },
          { x: 340, y: 280, w: 140, h: 16 },
          { x: 560, y: 240, w: 140, h: 16 },
          { x: 740, y: 200, w: 90, h: 16 }
        ],
        spikes: [
          { x: 500, y: 364, w: 50, h: 16 }
        ],
        coins: [
          { x: 205, y: 285, r: 8, taken: false },
          { x: 390, y: 245, r: 8, taken: false },
          { x: 605, y: 205, r: 8, taken: false }
        ],
        flag: { x: 800, y: 140, w: 18, h: 60 }
      },
      {
        playerStart: { x: 40, y: 300 },
        platforms: [
          { x: 0, y: 380, w: 900, h: 40 },
          { x: 130, y: 330, w: 110, h: 16 },
          { x: 280, y: 290, w: 110, h: 16 },
          { x: 440, y: 250, w: 110, h: 16 },
          { x: 600, y: 220, w: 120, h: 16 },
          { x: 760, y: 180, w: 90, h: 16 }
        ],
        spikes: [
          { x: 240, y: 364, w: 40, h: 16 },
          { x: 555, y: 364, w: 60, h: 16 }
        ],
        coins: [
          { x: 180, y: 295, r: 8, taken: false },
          { x: 330, y: 255, r: 8, taken: false },
          { x: 490, y: 215, r: 8, taken: false },
          { x: 655, y: 185, r: 8, taken: false }
        ],
        flag: { x: 815, y: 120, w: 18, h: 60 }
      },
      {
        playerStart: { x: 40, y: 300 },
        platforms: [
          { x: 0, y: 380, w: 900, h: 40 },
          { x: 100, y: 330, w: 100, h: 16 },
          { x: 240, y: 290, w: 90, h: 16 },
          { x: 380, y: 245, w: 90, h: 16 },
          { x: 520, y: 205, w: 90, h: 16 },
          { x: 650, y: 240, w: 90, h: 16 },
          { x: 770, y: 185, w: 90, h: 16 }
        ],
        spikes: [
          { x: 205, y: 364, w: 35, h: 16 },
          { x: 470, y: 364, w: 40, h: 16 },
          { x: 735, y: 364, w: 35, h: 16 }
        ],
        coins: [
          { x: 145, y: 295, r: 8, taken: false },
          { x: 285, y: 255, r: 8, taken: false },
          { x: 425, y: 210, r: 8, taken: false },
          { x: 565, y: 170, r: 8, taken: false },
          { x: 815, y: 150, r: 8, taken: false }
        ],
        flag: { x: 840, y: 125, w: 18, h: 60 }
      }
    ];

    const player = {
      x: 40,
      y: 300,
      w: 28,
      h: 34,
      vx: 0,
      vy: 0,
      onGround: false
    };

    function cloneLevel(level) {
      return {
        playerStart: { ...level.playerStart },
        platforms: level.platforms.map(p => ({ ...p })),
        spikes: level.spikes.map(s => ({ ...s })),
        coins: level.coins.map(c => ({ ...c })),
        flag: { ...level.flag }
      };
    }

    let activeLevel = cloneLevel(levels[currentLevelIndex]);

    function loadLevel(index) {
      currentLevelIndex = index;
      activeLevel = cloneLevel(levels[index]);
      player.x = activeLevel.playerStart.x;
      player.y = activeLevel.playerStart.y;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      levelCompleteTimer = 0;
      updateUI();
    }

    function updateUI() {
      levelBox.textContent = "Level: " + (currentLevelIndex + 1);
      coinBox.textContent = "Coins: " + totalCoins;
      livesBox.textContent = "Lives: " + lives;
    }

    function restartLevel() {
      loadLevel(currentLevelIndex);
    }

    function loseLife() {
      lives--;
      updateUI();

      if (lives <= 0) {
        lives = 3;
        totalCoins = 0;
        gameWon = false;
        loadLevel(0);
        updateUI();
        return;
      }

      restartLevel();
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function circleRectOverlap(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy < circle.r * circle.r;
    }

    function updatePlayer() {
      if (keys.left) player.vx -= moveSpeed;
      if (keys.right) player.vx += moveSpeed;

      player.vx *= friction;
      if (player.vx > maxSpeed) player.vx = maxSpeed;
      if (player.vx < -maxSpeed) player.vx = -maxSpeed;

      player.vy += gravity;

      player.x += player.vx;
      resolvePlatformCollisions("x");

      player.y += player.vy;
      player.onGround = false;
      resolvePlatformCollisions("y");

      if (player.y > canvas.height + 100) {
        loseLife();
      }
    }

    function resolvePlatformCollisions(axis) {
      for (const p of activeLevel.platforms) {
        if (!rectsOverlap(player, p)) continue;

        if (axis === "x") {
          if (player.vx > 0) {
            player.x = p.x - player.w;
          } else if (player.vx < 0) {
            player.x = p.x + p.w;
          }
          player.vx = 0;
        }

        if (axis === "y") {
          if (player.vy > 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
          }
        }
      }
    }

    function updateCoins() {
      activeLevel.coins.forEach(coin => {
        if (!coin.taken && circleRectOverlap(coin, player)) {
          coin.taken = true;
          totalCoins++;
          updateUI();
        }
      });
    }

    function updateSpikes() {
      for (const spike of activeLevel.spikes) {
        if (rectsOverlap(player, spike)) {
          loseLife();
          return;
        }
      }
    }

    function updateFlag() {
      if (rectsOverlap(player, activeLevel.flag)) {
        levelCompleteTimer++;

        if (levelCompleteTimer > 20) {
          if (currentLevelIndex < levels.length - 1) {
            loadLevel(currentLevelIndex + 1);
          } else {
            gameWon = true;
          }
        }
      } else {
        levelCompleteTimer = 0;
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#75d9ff");
      sky.addColorStop(0.75, "#e4f8ff");
      sky.addColorStop(1, "#daf0c3");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.beginPath();
      ctx.arc(90, 65, 28, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.beginPath();
      ctx.arc(250, 85, 18, 0, Math.PI * 2);
      ctx.arc(272, 85, 16, 0, Math.PI * 2);
      ctx.arc(292, 85, 14, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#9ad978";
      ctx.fillRect(0, canvas.height - 24, canvas.width, 24);
    }

    function drawPlatforms() {
      ctx.fillStyle = "#6b4eff";
      activeLevel.platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
      });
    }

    function drawSpikes() {
      ctx.fillStyle = "#ff5f8c";
      activeLevel.spikes.forEach(s => {
        const spikeCount = Math.floor(s.w / 10);
        for (let i = 0; i < spikeCount; i++) {
          ctx.beginPath();
          ctx.moveTo(s.x + i * 10, s.y + s.h);
          ctx.lineTo(s.x + i * 10 + 5, s.y);
          ctx.lineTo(s.x + i * 10 + 10, s.y + s.h);
          ctx.fill();
        }
      });
    }

    function drawCoins() {
      activeLevel.coins.forEach(coin => {
        if (coin.taken) return;
        ctx.fillStyle = "#ffd54a";
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffef9b";
        ctx.beginPath();
        ctx.arc(coin.x - 2, coin.y - 2, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawFlag() {
      const f = activeLevel.flag;
      ctx.fillStyle = "#5b3f2b";
      ctx.fillRect(f.x, f.y, 4, f.h);

      ctx.fillStyle = "#ff4d6d";
      ctx.fillRect(f.x + 4, f.y + 6, 22, 14);
    }

    function drawPlayer() {
      ctx.fillStyle = "#103b64";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      ctx.fillStyle = "#8ee9ff";
      ctx.fillRect(player.x + 4, player.y + 4, player.w - 8, player.h - 8);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(player.x + 16, player.y + 8, 6, 6);

      ctx.fillStyle = "#111111";
      ctx.fillRect(player.x + 19, player.y + 11, 2, 2);
    }

    function drawOverlay() {
      if (gameWon) {
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(275, 120, 350, 130);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 34px Arial";
        ctx.fillText("You Win!", 378, 165);

        ctx.font = "20px Arial";
        ctx.fillText("Total Coins: " + totalCoins, 372, 200);
        ctx.fillText("Refresh to play again", 350, 230);
      }
    }

    function gameLoop() {
      drawBackground();

      if (!gameWon) {
        updatePlayer();
        updateCoins();
        updateSpikes();
        updateFlag();
      }

      drawPlatforms();
      drawSpikes();
      drawCoins();
      drawFlag();
      drawPlayer();
      drawOverlay();

      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") keys.left = true;
      if (e.key === "ArrowRight") keys.right = true;

      if ((e.key === "ArrowUp" || e.key === " " || e.code === "Space") && player.onGround) {
        player.vy = jumpPower;
        player.onGround = false;
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") keys.left = false;
      if (e.key === "ArrowRight") keys.right = false;
    });

    restartBtn.addEventListener("click", restartLevel);

    loadLevel(0);
    gameLoop();
  </script>
</body>
</html>

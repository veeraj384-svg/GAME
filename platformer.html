<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platformer Quest | Game Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-adventure">
  <div class="page-shell">
    <main class="game-page-wrap">
      <section class="game-panel">
        <div class="game-topbar">
          <div class="game-header-left">
            <p class="eyebrow">Adventure Run</p>
            <h1>Platformer Quest</h1>
            <p class="game-subtext">
              Run, jump, collect coins, avoid spikes, and clear all 100 levels across a brighter, more polished world.
            </p>
          </div>
          <a href="index.html" class="back-link">&larr; Home</a>
        </div>

        <div class="info-row">
          <div class="status-box">Move: Left / Right</div>
          <div class="status-box">Jump: Space / Up</div>
          <div class="status-box" id="levelBox">Level: 1</div>
          <div class="status-box is-accent" id="coinBox">Coins: 0</div>
          <div class="status-box" id="livesBox">Lives: 3</div>
          <div class="status-box" id="unlockBox">Unlocked: 1</div>
        </div>

        <div class="canvas-stage">
          <canvas id="platformerCanvas" class="game-canvas" width="900" height="420"></canvas>
        </div>

        <div class="bottom-actions">
          <button class="secondary-button" id="prevLevelBtn">Previous Level</button>
          <button class="secondary-button" id="restartBtn">Restart Level</button>
          <button class="secondary-button" id="nextLevelBtn">Next Level</button>
          <button class="secondary-button" id="resetProgressBtn">Reset Progress</button>
        </div>

        <div class="message-banner" id="messageBox">Beat each level to unlock the next one.</div>

        <div class="level-panel">
          <h2 class="level-panel-title">Level Select</h2>
          <div class="level-grid" id="levelGrid"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("platformerCanvas");
    const ctx = canvas.getContext("2d");

    const levelBox = document.getElementById("levelBox");
    const coinBox = document.getElementById("coinBox");
    const livesBox = document.getElementById("livesBox");
    const unlockBox = document.getElementById("unlockBox");
    const messageBox = document.getElementById("messageBox");
    const levelGrid = document.getElementById("levelGrid");

    const prevLevelBtn = document.getElementById("prevLevelBtn");
    const nextLevelBtn = document.getElementById("nextLevelBtn");
    const restartBtn = document.getElementById("restartBtn");
    const resetProgressBtn = document.getElementById("resetProgressBtn");

    const gravity = 0.6;
    const friction = 0.82;
    const moveSpeed = 0.85;
    const maxSpeed = 6.2;
    const jumpPower = -12;
    const TOTAL_LEVELS = 100;
    const GROUND_Y = 380;

    let keys = {
      left: false,
      right: false
    };

    let totalCoins = Number(localStorage.getItem("platformerTotalCoins") || 0);
    let lives = 3;
    let currentLevelIndex = Number(localStorage.getItem("platformerCurrentLevel") || 0);
    let highestUnlockedLevel = Number(localStorage.getItem("platformerHighestUnlocked") || 0);
    let levelCompleteTimer = 0;
    let gameWon = false;

    const player = {
      x: 40,
      y: 300,
      w: 28,
      h: 34,
      vx: 0,
      vy: 0,
      onGround: false
    };

    let activeLevel = null;

    function saveProgress() {
      localStorage.setItem("platformerHighestUnlocked", highestUnlockedLevel);
      localStorage.setItem("platformerCurrentLevel", currentLevelIndex);
      localStorage.setItem("platformerTotalCoins", totalCoins);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function buildFlag(platforms, levelNumber) {
      const standOn = platforms[platforms.length - 1];
      const poleHeight = 60;
      const poleX = clamp(standOn.x + standOn.w - 18, 40, 860);

      return {
        x: poleX,
        y: standOn.y - poleHeight,
        w: 18,
        h: poleHeight,
        platformTop: standOn.y
      };
    }

    function generateLevel(levelNumber) {
      const idx = levelNumber - 1;
      const platforms = [{ x: 0, y: GROUND_Y, w: 900, h: 40 }];
      const spikes = [];
      const coins = [];

      const playerStart = { x: 40, y: 300 };

      let x = 100;
      let y = 330 - (idx % 3) * 8;
      const extraPlatforms = 4 + Math.min(6, Math.floor(idx / 10));
      const swing = 20 + (idx % 4) * 8;

      for (let i = 0; i < extraPlatforms; i++) {
        const width = 90 + ((idx + i * 11) % 3) * 20;
        y += ((idx + i) % 2 === 0 ? -1 : 1) * swing;
        y = clamp(y, 150, 330);

        if (x > 760) break;

        platforms.push({
          x,
          y,
          w: width,
          h: 16
        });

        coins.push({
          x: x + Math.floor(width / 2),
          y: y - 24,
          r: 8,
          taken: false
        });

        x += 115 + ((idx + i * 13) % 3) * 28;
      }

      if (platforms[platforms.length - 1].x < 720) {
        const last = platforms[platforms.length - 1];
        const finalY = clamp(last.y + (((idx % 2) === 0) ? -20 : 20), 160, 320);

        platforms.push({
          x: 760,
          y: finalY,
          w: 95,
          h: 16
        });

        coins.push({
          x: 807,
          y: finalY - 24,
          r: 8,
          taken: false
        });
      }

      const spikeCount = Math.min(6, 1 + Math.floor(idx / 15));
      for (let i = 0; i < spikeCount; i++) {
        const sx = 180 + ((idx * 71 + i * 117) % 600);
        spikes.push({
          x: sx,
          y: GROUND_Y - 16,
          w: 30 + ((idx + i) % 3) * 10,
          h: 16
        });
      }

      const flag = buildFlag(platforms, levelNumber);

      return {
        playerStart,
        platforms,
        spikes,
        coins,
        flag
      };
    }

    function loadLevel(index) {
      index = clamp(index, 0, TOTAL_LEVELS - 1);

      currentLevelIndex = index;
      activeLevel = generateLevel(index + 1);

      player.x = activeLevel.playerStart.x;
      player.y = activeLevel.playerStart.y;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;

      levelCompleteTimer = 0;
      gameWon = false;

      updateUI();
      renderLevelButtons();
      saveProgress();
    }

    function updateUI() {
      levelBox.textContent = "Level: " + (currentLevelIndex + 1);
      coinBox.textContent = "Coins: " + totalCoins;
      livesBox.textContent = "Lives: " + lives;
      unlockBox.textContent = "Unlocked: " + (highestUnlockedLevel + 1);

      if (currentLevelIndex === TOTAL_LEVELS - 1) {
        messageBox.textContent = "Final level. Beat it to finish all 100 levels.";
      } else {
        messageBox.textContent = "Beat level " + (currentLevelIndex + 1) + " to unlock level " + (currentLevelIndex + 2) + ".";
      }
    }

    function renderLevelButtons() {
      levelGrid.innerHTML = "";

      for (let i = 0; i < TOTAL_LEVELS; i++) {
        const btn = document.createElement("button");
        btn.className = "level-btn";
        btn.textContent = i + 1;

        if (i === currentLevelIndex) {
          btn.classList.add("current");
        }

        if (i > highestUnlockedLevel) {
          btn.classList.add("locked");
          btn.disabled = true;
        } else {
          btn.addEventListener("click", () => loadLevel(i));
        }

        levelGrid.appendChild(btn);
      }
    }

    function restartLevel() {
      loadLevel(currentLevelIndex);
    }

    function resetProgress() {
      totalCoins = 0;
      lives = 3;
      currentLevelIndex = 0;
      highestUnlockedLevel = 0;
      localStorage.removeItem("platformerHighestUnlocked");
      localStorage.removeItem("platformerCurrentLevel");
      localStorage.removeItem("platformerTotalCoins");
      loadLevel(0);
    }

    function goPrevLevel() {
      if (currentLevelIndex > 0) {
        loadLevel(currentLevelIndex - 1);
      }
    }

    function goNextLevel() {
      if (currentLevelIndex < highestUnlockedLevel && currentLevelIndex < TOTAL_LEVELS - 1) {
        loadLevel(currentLevelIndex + 1);
      }
    }

    function loseLife() {
      lives--;
      updateUI();

      if (lives <= 0) {
        lives = 3;
        restartLevel();
        return;
      }

      restartLevel();
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function circleRectOverlap(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy < circle.r * circle.r;
    }

    function updatePlayer() {
      if (keys.left) player.vx -= moveSpeed;
      if (keys.right) player.vx += moveSpeed;

      player.vx *= friction;
      player.vx = clamp(player.vx, -maxSpeed, maxSpeed);

      player.vy += gravity;

      player.x += player.vx;
      resolvePlatformCollisions("x");

      player.y += player.vy;
      player.onGround = false;
      resolvePlatformCollisions("y");

      if (player.y > canvas.height + 100) {
        loseLife();
      }

      if (player.x < 0) player.x = 0;
      if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
    }

    function resolvePlatformCollisions(axis) {
      for (const p of activeLevel.platforms) {
        if (!rectsOverlap(player, p)) continue;

        if (axis === "x") {
          if (player.vx > 0) {
            player.x = p.x - player.w;
          } else if (player.vx < 0) {
            player.x = p.x + p.w;
          }
          player.vx = 0;
        }

        if (axis === "y") {
          if (player.vy > 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
          }
        }
      }
    }

    function updateCoins() {
      activeLevel.coins.forEach((coin) => {
        if (!coin.taken && circleRectOverlap(coin, player)) {
          coin.taken = true;
          totalCoins++;
          updateUI();
          saveProgress();
        }
      });
    }

    function updateSpikes() {
      for (const spike of activeLevel.spikes) {
        if (rectsOverlap(player, spike)) {
          loseLife();
          return;
        }
      }
    }

    function updateFlag() {
      const poleRect = {
        x: activeLevel.flag.x,
        y: activeLevel.flag.y,
        w: 10,
        h: activeLevel.flag.h
      };

      const bannerRect = {
        x: activeLevel.flag.x + 4,
        y: activeLevel.flag.y + 6,
        w: 22,
        h: 14
      };

      if (rectsOverlap(player, poleRect) || rectsOverlap(player, bannerRect)) {
        levelCompleteTimer++;

        if (levelCompleteTimer > 18) {
          if (currentLevelIndex < TOTAL_LEVELS - 1) {
            if (currentLevelIndex + 1 > highestUnlockedLevel) {
              highestUnlockedLevel = currentLevelIndex + 1;
            }
            loadLevel(currentLevelIndex + 1);
          } else {
            gameWon = true;
            highestUnlockedLevel = TOTAL_LEVELS - 1;
            updateUI();
            renderLevelButtons();
            saveProgress();
          }
        }
      } else {
        levelCompleteTimer = 0;
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#67cfff");
      sky.addColorStop(0.7, "#def6ff");
      sky.addColorStop(1, "#dff1c2");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255, 214, 116, 0.36)";
      ctx.beginPath();
      ctx.arc(104, 68, 32, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.74)";
      ctx.beginPath();
      ctx.arc(250, 85, 18, 0, Math.PI * 2);
      ctx.arc(272, 85, 16, 0, Math.PI * 2);
      ctx.arc(292, 85, 14, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(640, 72, 17, 0, Math.PI * 2);
      ctx.arc(662, 72, 15, 0, Math.PI * 2);
      ctx.arc(682, 72, 13, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#a7d7ad";
      ctx.beginPath();
      ctx.moveTo(0, 300);
      ctx.quadraticCurveTo(130, 210, 270, 300);
      ctx.quadraticCurveTo(400, 220, 540, 300);
      ctx.quadraticCurveTo(650, 230, 900, 300);
      ctx.lineTo(900, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#7fc88c";
      ctx.beginPath();
      ctx.moveTo(0, 332);
      ctx.quadraticCurveTo(140, 262, 320, 332);
      ctx.quadraticCurveTo(470, 272, 610, 332);
      ctx.quadraticCurveTo(760, 272, 900, 332);
      ctx.lineTo(900, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#74bd60";
      ctx.fillRect(0, canvas.height - 24, canvas.width, 24);
    }

    function drawPlatforms() {
      const colors = ["#6b4eff", "#4f7bff", "#9459ff", "#4dc1ff", "#5e6dff"];
      const color = colors[currentLevelIndex % colors.length];

      activeLevel.platforms.forEach((p) => {
        ctx.fillStyle = color;
        drawRoundedRect(ctx, p.x, p.y, p.w, p.h, 8);
        ctx.fill();

        ctx.fillStyle = "rgba(255, 255, 255, 0.22)";
        drawRoundedRect(ctx, p.x + 4, p.y + 3, p.w - 8, 4, 2);
        ctx.fill();

        ctx.fillStyle = "rgba(18, 35, 84, 0.2)";
        drawRoundedRect(ctx, p.x + 4, p.y + 8, p.w - 8, p.h - 10, 4);
        ctx.fill();
      });
    }

    function drawSpikes() {
      activeLevel.spikes.forEach((s) => {
        const spikeCount = Math.floor(s.w / 10);
        for (let i = 0; i < spikeCount; i++) {
          ctx.fillStyle = "#ff5f8c";
          ctx.beginPath();
          ctx.moveTo(s.x + i * 10, s.y + s.h);
          ctx.lineTo(s.x + i * 10 + 5, s.y);
          ctx.lineTo(s.x + i * 10 + 10, s.y + s.h);
          ctx.fill();

          ctx.fillStyle = "rgba(255, 219, 230, 0.55)";
          ctx.beginPath();
          ctx.moveTo(s.x + i * 10 + 2, s.y + s.h - 1);
          ctx.lineTo(s.x + i * 10 + 5, s.y + 5);
          ctx.lineTo(s.x + i * 10 + 8, s.y + s.h - 1);
          ctx.fill();
        }
      });
    }

    function drawCoins() {
      activeLevel.coins.forEach((coin) => {
        if (coin.taken) return;

        ctx.save();
        ctx.shadowColor = "rgba(255, 213, 74, 0.5)";
        ctx.shadowBlur = 16;
        ctx.fillStyle = "#ffd54a";
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = "#ffef9b";
        ctx.beginPath();
        ctx.arc(coin.x - 2, coin.y - 2, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 245, 189, 0.65)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.r - 3, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    function drawFlag() {
      const f = activeLevel.flag;
      ctx.fillStyle = "#5b3f2b";
      drawRoundedRect(ctx, f.x, f.y, 4, f.h, 2);
      ctx.fill();

      ctx.fillStyle = "#ff4d6d";
      ctx.beginPath();
      ctx.moveTo(f.x + 4, f.y + 6);
      ctx.lineTo(f.x + 28, f.y + 13);
      ctx.lineTo(f.x + 4, f.y + 20);
      ctx.closePath();
      ctx.fill();
    }

    function drawPlayer() {
      ctx.fillStyle = "#143e66";
      drawRoundedRect(ctx, player.x, player.y, player.w, player.h, 8);
      ctx.fill();

      ctx.fillStyle = "#8ee9ff";
      drawRoundedRect(ctx, player.x + 4, player.y + 5, player.w - 8, player.h - 10, 6);
      ctx.fill();

      ctx.fillStyle = "#ffcb68";
      drawRoundedRect(ctx, player.x + 6, player.y + 3, player.w - 12, 6, 3);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(player.x + 19, player.y + 13, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#111111";
      ctx.beginPath();
      ctx.arc(player.x + 20.5, player.y + 13, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLevelNumber() {
      ctx.fillStyle = "rgba(20, 49, 79, 0.72)";
      drawRoundedRect(ctx, 14, 14, 126, 38, 14);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 20px Arial";
      ctx.fillText("Level " + (currentLevelIndex + 1), 28, 39);
    }

    function drawOverlay() {
      if (gameWon) {
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        drawRoundedRect(ctx, 255, 110, 390, 138, 22);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 34px Arial";
        ctx.fillText("100 Levels Complete!", 275, 160);

        ctx.font = "20px Arial";
        ctx.fillText("Total Coins: " + totalCoins, 360, 195);
        ctx.fillText("You beat Platformer Quest", 315, 226);
      }
    }

    function gameLoop() {
      drawBackground();

      if (!gameWon) {
        updatePlayer();
        updateCoins();
        updateSpikes();
        updateFlag();
      }

      drawPlatforms();
      drawSpikes();
      drawCoins();
      drawFlag();
      drawPlayer();
      drawLevelNumber();
      drawOverlay();

      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") keys.left = true;
      if (e.key === "ArrowRight") keys.right = true;

      if ((e.key === "ArrowUp" || e.key === " " || e.code === "Space") && player.onGround) {
        e.preventDefault();
        player.vy = jumpPower;
        player.onGround = false;
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") keys.left = false;
      if (e.key === "ArrowRight") keys.right = false;
    });

    prevLevelBtn.addEventListener("click", goPrevLevel);
    nextLevelBtn.addEventListener("click", goNextLevel);
    restartBtn.addEventListener("click", restartLevel);
    resetProgressBtn.addEventListener("click", resetProgress);

    if (currentLevelIndex > highestUnlockedLevel) {
      currentLevelIndex = highestUnlockedLevel;
    }

    loadLevel(currentLevelIndex);
    gameLoop();
  </script>
</body>
</html>
